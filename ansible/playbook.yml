---
- name: Deploy server-project
  hosts: servers
  become: yes

  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes
        force_apt_get: yes

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker compose
      apt:
        name: docker-compose
        state: present

    - name: Clone server-project
      git:
        repo: https://github.com/Alexandr-creat/server-project.git
        dest: /home/alexandr/server-project
        force: yes

    - name: Delete old notes
      command: docker rm -f notes
      ignore_errors: yes

    - name: Stop old containers
      command: docker compose down
      args:
        chdir: /home/alexandr/server-project
      ignore_errors: yes

    - name: Run docker-compose
      command: docker compose up -d
      args:
        chdir: /home/alexandr/server-project
